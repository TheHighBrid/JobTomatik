apply plugin: 'com.android.application'

// Release signing is optional and must be provided outside source control.
// Supported environment variables:
//   JOBTOMATIK_KEYSTORE_PATH
//   JOBTOMATIK_KEYSTORE_PASSWORD
//   JOBTOMATIK_KEY_ALIAS
//   JOBTOMATIK_KEY_PASSWORD
// Equivalent Gradle properties may be supplied as jobtomatikKeystorePath,
// jobtomatikKeystorePassword, jobtomatikKeyAlias, and jobtomatikKeyPassword.
def releaseKeystorePath = System.getenv('JOBTOMATIK_KEYSTORE_PATH') ?: project.findProperty('jobtomatikKeystorePath')
def releaseKeystorePassword = System.getenv('JOBTOMATIK_KEYSTORE_PASSWORD') ?: project.findProperty('jobtomatikKeystorePassword')
def releaseKeyAlias = System.getenv('JOBTOMATIK_KEY_ALIAS') ?: project.findProperty('jobtomatikKeyAlias')
def releaseKeyPassword = System.getenv('JOBTOMATIK_KEY_PASSWORD') ?: project.findProperty('jobtomatikKeyPassword')
def releaseSigningConfigured = [
        releaseKeystorePath,
        releaseKeystorePassword,
        releaseKeyAlias,
        releaseKeyPassword,
].every { value -> value != null && value.toString().trim() }

android {
    namespace "ca.jobtomatik.app"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "ca.jobtomatik.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 100
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Files and directories omitted from the packaged web assets.
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        if (releaseSigningConfigured) {
            release {
                storeFile file(releaseKeystorePath)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseSigningConfigured) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
