version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobtomatik
      POSTGRES_PASSWORD: jobtomatik_pass
      POSTGRES_DB: jobtomatik
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobtomatik"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://jobtomatik:jobtomatik_pass@db:5432/jobtomatik
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkey-change-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@jobtomatik.com}
      - ALLOW_REAL_APPLICATION_SUBMIT=${ALLOW_REAL_APPLICATION_SUBMIT:-false}
      - AUTOPILOT_ENABLED=${AUTOPILOT_ENABLED:-false}
      - AUTOPILOT_DEFAULT_DAILY_CAP=${AUTOPILOT_DEFAULT_DAILY_CAP:-5}
      - AUTOPILOT_DEFAULT_WEEKLY_CAP=${AUTOPILOT_DEFAULT_WEEKLY_CAP:-20}
      - AUTOPILOT_QUIET_HOURS_START_UTC=${AUTOPILOT_QUIET_HOURS_START_UTC:-0}
      - AUTOPILOT_QUIET_HOURS_END_UTC=${AUTOPILOT_QUIET_HOURS_END_UTC:-6}
      - AUTOPILOT_FAILURE_THRESHOLD=${AUTOPILOT_FAILURE_THRESHOLD:-3}
      - AUTOPILOT_FAILURE_WINDOW_MINUTES=${AUTOPILOT_FAILURE_WINDOW_MINUTES:-60}
      - AUTOPILOT_CIRCUIT_BREAKER_MINUTES=${AUTOPILOT_CIRCUIT_BREAKER_MINUTES:-120}
      - AUTOPILOT_DISABLED_PLATFORMS=${AUTOPILOT_DISABLED_PLATFORMS:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info -Q default,scraping,applications,followup
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    environment:
      - DATABASE_URL=postgresql://jobtomatik:jobtomatik_pass@db:5432/jobtomatik
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkey-change-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@jobtomatik.com}
      - ALLOW_REAL_APPLICATION_SUBMIT=${ALLOW_REAL_APPLICATION_SUBMIT:-false}
      - AUTOPILOT_ENABLED=${AUTOPILOT_ENABLED:-false}
      - AUTOPILOT_DEFAULT_DAILY_CAP=${AUTOPILOT_DEFAULT_DAILY_CAP:-5}
      - AUTOPILOT_DEFAULT_WEEKLY_CAP=${AUTOPILOT_DEFAULT_WEEKLY_CAP:-20}
      - AUTOPILOT_QUIET_HOURS_START_UTC=${AUTOPILOT_QUIET_HOURS_START_UTC:-0}
      - AUTOPILOT_QUIET_HOURS_END_UTC=${AUTOPILOT_QUIET_HOURS_END_UTC:-6}
      - AUTOPILOT_FAILURE_THRESHOLD=${AUTOPILOT_FAILURE_THRESHOLD:-3}
      - AUTOPILOT_FAILURE_WINDOW_MINUTES=${AUTOPILOT_FAILURE_WINDOW_MINUTES:-60}
      - AUTOPILOT_CIRCUIT_BREAKER_MINUTES=${AUTOPILOT_CIRCUIT_BREAKER_MINUTES:-120}
      - AUTOPILOT_DISABLED_PLATFORMS=${AUTOPILOT_DISABLED_PLATFORMS:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://jobtomatik:jobtomatik_pass@db:5432/jobtomatik
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-supersecretkey-change-in-production}
      - ALLOW_REAL_APPLICATION_SUBMIT=${ALLOW_REAL_APPLICATION_SUBMIT:-false}
      - AUTOPILOT_ENABLED=${AUTOPILOT_ENABLED:-false}
      - AUTOPILOT_DEFAULT_DAILY_CAP=${AUTOPILOT_DEFAULT_DAILY_CAP:-5}
      - AUTOPILOT_DEFAULT_WEEKLY_CAP=${AUTOPILOT_DEFAULT_WEEKLY_CAP:-20}
      - AUTOPILOT_QUIET_HOURS_START_UTC=${AUTOPILOT_QUIET_HOURS_START_UTC:-0}
      - AUTOPILOT_QUIET_HOURS_END_UTC=${AUTOPILOT_QUIET_HOURS_END_UTC:-6}
      - AUTOPILOT_FAILURE_THRESHOLD=${AUTOPILOT_FAILURE_THRESHOLD:-3}
      - AUTOPILOT_FAILURE_WINDOW_MINUTES=${AUTOPILOT_FAILURE_WINDOW_MINUTES:-60}
      - AUTOPILOT_CIRCUIT_BREAKER_MINUTES=${AUTOPILOT_CIRCUIT_BREAKER_MINUTES:-120}
      - AUTOPILOT_DISABLED_PLATFORMS=${AUTOPILOT_DISABLED_PLATFORMS:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
  uploads_data:
