name: Greenhouse pilot ledger ingestion certification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/app/config.py"
      - "backend/app/services/greenhouse_pilot_ingestion.py"
      - "backend/app/api/greenhouse_pilot_ledger.py"
      - "backend/app/main.py"
      - "backend/evidence/greenhouse-phase-a-baseline.csv"
      - "backend/evidence/greenhouse-phase-a-sources.csv"
      - "backend/evidence/greenhouse-phase-a-readiness.json"
      - "backend/evidence/greenhouse-phase-a-readiness.md"
      - "backend/tests/test_greenhouse_pilot_ingestion.py"
      - "docs/operations/greenhouse-phase-a-baseline.md"
      - "docs/operations/greenhouse-pilot-ledger-ingestion.md"
      - ".env.example"
      - ".github/workflows/greenhouse-pilot-ledger-ingestion.yml"
  push:
    branches:
      - main
    paths:
      - "backend/app/config.py"
      - "backend/app/services/greenhouse_pilot_ingestion.py"
      - "backend/app/api/greenhouse_pilot_ledger.py"
      - "backend/app/main.py"
      - "backend/evidence/greenhouse-phase-a-baseline.csv"
      - "backend/evidence/greenhouse-phase-a-sources.csv"
      - "backend/evidence/greenhouse-phase-a-readiness.json"
      - "backend/evidence/greenhouse-phase-a-readiness.md"
      - "backend/tests/test_greenhouse_pilot_ingestion.py"
      - "docs/operations/greenhouse-phase-a-baseline.md"
      - "docs/operations/greenhouse-pilot-ledger-ingestion.md"
      - ".env.example"
      - ".github/workflows/greenhouse-pilot-ledger-ingestion.yml"

permissions:
  contents: read

jobs:
  locked-ledger-ingestion:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./pilot-ledger-ingestion-ci.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: pilot-ledger-ingestion-ci-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      GREENHOUSE_SUPERVISED_PILOT_ENABLED: "false"
      AUTOPILOT_ENABLED: "false"
      ENABLE_RESUMABLE_HANDOFFS: "false"
      GREENHOUSE_PILOT_BASELINE_PATH: evidence/greenhouse-phase-a-baseline.csv
      GREENHOUSE_PILOT_LEDGER_PATH: evidence-ci/greenhouse-pilot-ledger.jsonl
      GREENHOUSE_PILOT_READINESS_JSON_PATH: evidence-ci/greenhouse-pilot-readiness.json
      GREENHOUSE_PILOT_READINESS_MARKDOWN_PATH: evidence-ci/greenhouse-pilot-readiness.md
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Compile pilot ledger ingestion modules
        run: |
          python -m py_compile \
            app/services/greenhouse_pilot_ingestion.py \
            app/api/greenhouse_pilot_ledger.py

      - name: Verify Phase A artifact baseline
        run: |
          python - <<'PY'
          from pathlib import Path
          from app.services.greenhouse_pilot_ingestion import (
              PHASE_A_BASELINE_SHA256,
              load_phase_a_baseline,
          )
          import hashlib

          path = Path("evidence/greenhouse-phase-a-baseline.csv")
          records = load_phase_a_baseline(path)
          employers = {record["employer"].strip().lower() for record in records}
          assert len(records) == 30
          assert len(employers) == 30
          assert hashlib.sha256(path.read_bytes()).hexdigest() == PHASE_A_BASELINE_SHA256
          assert all(record["final_submit_clicked"] is False for record in records)
          print("Verified 30 artifact-backed Phase A records across 30 employers")
          PY

      - name: Run locked ingestion regression suite
        id: regression
        shell: bash --noprofile --norc -e -o pipefail {0}
        run: |
          set +e
          pytest -q --tb=short -ra tests/test_greenhouse_pilot_ingestion.py > pilot-ledger-pytest.txt 2>&1
          status=$?
          cat pilot-ledger-pytest.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload locked ingestion regression report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: greenhouse-pilot-ledger-ingestion-pytest
          path: backend/pilot-ledger-pytest.txt
          if-no-files-found: error
          retention-days: 30

      - name: Fail when locked ingestion regression failed
        if: steps.regression.outputs.exit_code != '0'
        run: exit 1

      - name: Assert runtime remains evidence only
        run: |
          python - <<'PY'
          from app.config import get_settings
          from app.services.operations_policy import operations_readiness_manifest

          settings = get_settings()
          readiness = operations_readiness_manifest()
          assert settings.allow_real_application_submit is False
          assert settings.greenhouse_supervised_pilot_enabled is False
          assert readiness["autopilot_enabled"] is False
          print("Pilot ledger ingestion safety defaults passed")
          PY
