name: Submission evidence review certification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/app/models/submission_evidence_review.py"
      - "backend/app/services/submission_evidence_review.py"
      - "backend/app/api/submission_evidence_reviews.py"
      - "backend/app/schemas/submission_evidence_review.py"
      - "backend/app/services/application_state.py"
      - "backend/app/models/__init__.py"
      - "backend/app/main.py"
      - "backend/tests/test_submission_evidence_review.py"
      - "docs/operations/submission-evidence-independent-review.md"
      - ".github/workflows/submission-evidence-review.yml"
  push:
    branches:
      - main
    paths:
      - "backend/app/models/submission_evidence_review.py"
      - "backend/app/services/submission_evidence_review.py"
      - "backend/app/api/submission_evidence_reviews.py"
      - "backend/app/schemas/submission_evidence_review.py"
      - "backend/app/services/application_state.py"
      - "backend/app/models/__init__.py"
      - "backend/app/main.py"
      - "backend/tests/test_submission_evidence_review.py"
      - "docs/operations/submission-evidence-independent-review.md"
      - ".github/workflows/submission-evidence-review.yml"

permissions:
  contents: read

jobs:
  independent-evidence-review:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./submission-evidence-review-ci.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: submission-evidence-review-ci-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      GREENHOUSE_SUPERVISED_PILOT_ENABLED: "false"
      AUTOPILOT_ENABLED: "false"
      ENABLE_RESUMABLE_HANDOFFS: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Compile evidence review modules
        run: |
          python -m py_compile \
            app/models/submission_evidence_review.py \
            app/services/submission_evidence_review.py \
            app/api/submission_evidence_reviews.py \
            app/schemas/submission_evidence_review.py

      - name: Run independent evidence review regression suite
        run: pytest -q --tb=short -ra tests/test_submission_evidence_review.py

      - name: Assert fail-safe runtime defaults
        run: |
          python - <<'PY'
          from app.config import get_settings
          from app.services.operations_policy import operations_readiness_manifest

          settings = get_settings()
          readiness = operations_readiness_manifest()
          assert settings.allow_real_application_submit is False
          assert getattr(settings, "greenhouse_supervised_pilot_enabled", False) is False
          assert readiness["autopilot_enabled"] is False
          print("Evidence review safety defaults passed")
          PY
