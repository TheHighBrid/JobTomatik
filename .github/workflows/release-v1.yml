name: Release JobTomatik v1

on:
  push:
    branches:
      - release/v1.0.0
  pull_request:
    branches:
      - main
    paths:
      - "RELEASE_SOURCE.txt"
      - ".github/workflows/release-v1.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: release-jobtomatik-v1
  cancel-in-progress: true

env:
  RELEASE_SOURCE_SHA: 6f7f9fa6a7d3c63516cde381410ac188364dba36

jobs:
  announce-release:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Announce authorized release run
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 79,
              body: `🚀 Authorized JobTomatik v1.00 publication started.\n\nRun: ${runUrl}\nFrozen source: \`${process.env.RELEASE_SOURCE_SHA}\``,
            });

  verify-backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./release-test.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: release-ci-only-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      GREENHOUSE_SUPERVISED_PILOT_ENABLED: "false"
      AUTOPILOT_ENABLED: "false"
      REQUIRE_BROWSER_TESTS: "1"
    steps:
      - name: Check out frozen v1 release source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SOURCE_SHA }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install chromium

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run full backend suite
        shell: bash
        run: |
          set -o pipefail
          pytest -q --tb=short --maxfail=1 -ra | tee release-pytest-output.txt

      - name: Run migration smoke test
        shell: bash
        run: |
          cp alembic.ini alembic-release.ini
          sed -i 's#sqlalchemy.url = .*#sqlalchemy.url = sqlite:///./release-migration.db#' alembic-release.ini
          alembic -c alembic-release.ini upgrade head

      - name: Upload backend verification
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jobtomatik-v1-backend-verification
          path: backend/release-pytest-output.txt
          if-no-files-found: warn
          retention-days: 90

  build-android:
    needs: verify-backend
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out frozen v1 release source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_SOURCE_SHA }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend and synchronize Capacitor
        run: npm run android:prepare

      - name: Select signing mode
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.JOBTOMATIK_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.JOBTOMATIK_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.JOBTOMATIK_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.JOBTOMATIK_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            KEYSTORE_PATH="$RUNNER_TEMP/jobtomatik-release.jks"
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
            test -s "$KEYSTORE_PATH"
            echo "JOBTOMATIK_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "JOBTOMATIK_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "JOBTOMATIK_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "JOBTOMATIK_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "APK_VARIANT=release" >> "$GITHUB_ENV"
            echo "SIGNING_MODE=release" >> "$GITHUB_ENV"
          else
            echo "APK_VARIANT=debug" >> "$GITHUB_ENV"
            echo "SIGNING_MODE=development" >> "$GITHUB_ENV"
          fi

      - name: Lint and assemble APK
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          cd android
          ./gradlew --no-daemon lintDebug
          if [ "$APK_VARIANT" = "release" ]; then
            ./gradlew --no-daemon assembleRelease
          else
            ./gradlew --no-daemon assembleDebug
          fi

      - name: Package and verify release files
        shell: bash
        run: |
          set -euo pipefail
          if [ "$APK_VARIANT" = "release" ]; then
            SOURCE_APK="android/app/build/outputs/apk/release/app-release.apk"
          else
            SOURCE_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          fi

          test -s "$SOURCE_APK"
          mkdir -p release
          cp "$SOURCE_APK" release/JobTomatik-v1.00.apk

          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging release/JobTomatik-v1.00.apk \
            | tee release/APK-BADGING.txt
          grep -q "package: name='ca.jobtomatik.app'" release/APK-BADGING.txt
          grep -q "versionCode='100'" release/APK-BADGING.txt
          grep -q "versionName='1.0.0'" release/APK-BADGING.txt

          sha256sum release/JobTomatik-v1.00.apk > release/JobTomatik-v1.00.sha256

          cat > release/BUILD-INFO.txt <<EOF
          JobTomatik v1.00
          Technical version: 1.0.0
          Android application ID: ca.jobtomatik.app
          Android version code: 100
          Signing mode: $SIGNING_MODE
          Source commit: $RELEASE_SOURCE_SHA
          Built by: GitHub Actions

          A development-signed APK is installable for personal/local use, but a future
          APK signed by a different certificate may require uninstalling this client.
          Backend data is stored separately and is not embedded in the APK.
          EOF

          cat > release/RELEASE_NOTES.md <<EOF
          # JobTomatik v1.00

          JobTomatik v1.00 is the first complete supervised release. It includes job
          search and review, application preparation, encrypted answer policies,
          retained-browser handoffs, expired-code recovery, explicit employer
          confirmation evidence, follow-up tracking, and an Android client.

          **Signing mode:** \`$SIGNING_MODE\`

          **Frozen source:** \`$RELEASE_SOURCE_SHA\`

          The APK is a client. Run the FastAPI backend, Redis, and Celery worker using
          the repository setup tutorial, then connect the app to
          \`http://127.0.0.1:8010\` for the same-device Android configuration.

          Real and unattended submission remain disabled by default. JobTomatik does
          not bypass CAPTCHA, login, MFA, assessment, or identity-verification steps.

          Read \`BUILD-INFO.txt\` before installing or upgrading.
          EOF

      - name: Upload release bundle
        uses: actions/upload-artifact@v6
        with:
          name: JobTomatik-v1.00-release-bundle
          path: frontend/release/*
          if-no-files-found: error
          retention-days: 90

  publish-release:
    needs:
      - verify-backend
      - build-android
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v6
        with:
          name: JobTomatik-v1.00-release-bundle
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          target_commitish: ${{ env.RELEASE_SOURCE_SHA }}
          name: JobTomatik v1.00
          body_path: release/RELEASE_NOTES.md
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release/JobTomatik-v1.00.apk
            release/JobTomatik-v1.00.sha256
            release/BUILD-INFO.txt
            release/APK-BADGING.txt

  report-release-status:
    needs:
      - announce-release
      - verify-backend
      - build-android
      - publish-release
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    steps:
      - name: Report authorized release result
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const verify = '${{ needs.verify-backend.result }}';
            const android = '${{ needs.build-android.result }}';
            const publish = '${{ needs.publish-release.result }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 79,
              body: `JobTomatik v1.00 publication finished.\n\n- Backend: **${verify}**\n- Android: **${android}**\n- Publication: **${publish}**\n- Run: ${runUrl}\n- Frozen source: \`${process.env.RELEASE_SOURCE_SHA}\``,
            });
