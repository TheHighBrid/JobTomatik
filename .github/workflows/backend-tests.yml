name: Backend tests

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: sqlite:///./ci-test.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-only-secret-key
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Run backend test suite
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q --tb=short --maxfail=5 -ra > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-pytest-output
          path: backend/pytest-output.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail when pytest failed
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
