name: SmartRecruiters live smoke certification

on:
  pull_request:
    paths:
      - "backend/app/services/ats_*.py"
      - "backend/app/services/smartrecruiters_certification.py"
      - "backend/app/services/form_filler*.py"
      - "backend/app/services/upload_handler.py"
      - "backend/scripts/certify_smartrecruiters_live.py"
      - ".github/workflows/smartrecruiters-live-smoke.yml"
  schedule:
    - cron: "7 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-public-form-inspection:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./smartrecruiters-live-smoke.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: smartrecruiters-live-smoke-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Select current public SmartRecruiters jobs
        shell: bash
        run: |
          python - <<'PY'
          import httpx

          company = 'smartrecruiters'
          listing = httpx.get(
              f'https://api.smartrecruiters.com/v1/companies/{company}/postings',
              params={'limit': 100, 'offset': 0},
              timeout=25,
              follow_redirects=True,
          )
          listing.raise_for_status()
          jobs = list(listing.json().get('content') or [])
          jobs.sort(key=lambda job: job.get('releasedDate') or '', reverse=True)
          urls = []
          for job in jobs:
              identifier = str(job.get('id') or job.get('uuid') or '')
              if not identifier:
                  continue
              details = httpx.get(
                  f'https://api.smartrecruiters.com/v1/companies/{company}/postings/{identifier}',
                  timeout=25,
                  follow_redirects=True,
              )
              if details.status_code != 200:
                  continue
              payload = details.json()
              if payload.get('active') and payload.get('applyUrl'):
                  urls.append(payload['applyUrl'])
              if len(urls) >= 3:
                  break
          if not urls:
              raise SystemExit('No current SmartRecruiters application URLs were returned.')
          open('smartrecruiters-live-urls.txt', 'w').write('\n'.join(urls))
          print('\n'.join(urls))
          PY

      - name: Inspect current live forms and official public metadata
        id: live_inspection
        shell: bash
        run: |
          set +e
          python -u scripts/certify_smartrecruiters_live.py \
            --urls "$(cat smartrecruiters-live-urls.txt)" \
            --report smartrecruiters-live-smoke.json \
            > smartrecruiters-live-output.txt 2>&1
          status=$?
          cat smartrecruiters-live-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert live run never submitted
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('smartrecruiters-live-smoke.json'))
          assert report['final_submit_clicked'] is False
          assert report['url_count'] >= 1
          assert all(item.get('mode') == 'inspect' for item in report['reports'])
          assert report['passed'] is True
          assert all(item.get('adapter') == 'smartrecruiters' for item in report['reports'])
          assert all(
              (item.get('public_metadata') or {}).get('posting_metadata_certified')
              for item in report['reports']
          )
          PY

      - name: Upload live smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartrecruiters-live-smoke-report
          path: |
            backend/smartrecruiters-live-smoke.json
            backend/smartrecruiters-live-output.txt
            backend/smartrecruiters-live-urls.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when live inspection failed
        if: steps.live_inspection.outputs.exit_code != '0'
        run: exit 1
