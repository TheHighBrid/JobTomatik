name: SmartRecruiters live smoke certification

on:
  pull_request:
    paths:
      - "backend/app/services/ats_*.py"
      - "backend/app/services/smartrecruiters_*.py"
      - "backend/app/services/form_filler*.py"
      - "backend/app/services/upload_handler.py"
      - "backend/scripts/certify_smartrecruiters_live.py"
      - "backend/scripts/select_smartrecruiters_candidates.py"
      - ".github/workflows/smartrecruiters-live-smoke.yml"
  schedule:
    - cron: "7 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-public-form-inspection:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./smartrecruiters-live-smoke.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: smartrecruiters-live-smoke-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Select current public SmartRecruiters jobs across tenants
        shell: bash
        run: |
          python scripts/select_smartrecruiters_candidates.py \
            --output smartrecruiters-live-candidates.json \
            --urls-output smartrecruiters-live-urls.txt \
            --limit 30 \
            --per-company 2

      - name: Inspect current live forms and official public metadata
        id: live_inspection
        shell: bash
        run: |
          set +e
          : > smartrecruiters-live-output.txt
          rm -f smartrecruiters-live-attempt-*.json smartrecruiters-live-smoke.json
          index=0
          success_count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            index=$((index + 1))
            report="smartrecruiters-live-attempt-${index}.json"
            echo "=== Attempt ${index}: ${url} ===" | tee -a smartrecruiters-live-output.txt
            python -u scripts/certify_smartrecruiters_live.py \
              --urls "$url" \
              --report "$report" \
              >> smartrecruiters-live-output.txt 2>&1
            status=$?
            if [ "$status" -eq 0 ]; then
              success_count=$((success_count + 1))
            fi
            if [ "$success_count" -ge 3 ]; then
              break
            fi
          done < smartrecruiters-live-urls.txt

          python - <<'PY'
          import glob
          import json

          attempts = []
          reports = []
          for path in sorted(glob.glob('smartrecruiters-live-attempt-*.json')):
              payload = json.load(open(path))
              attempts.append({
                  'path': path,
                  'passed': bool(payload.get('passed')),
                  'final_submit_clicked': bool(payload.get('final_submit_clicked')),
              })
              reports.extend(payload.get('reports') or [])
          passed_reports = [item for item in reports if item.get('passed')]
          summary = {
              'certification': 'smartrecruiters_multi_tenant_live_smoke',
              'attempt_count': len(attempts),
              'passed_form_count': len(passed_reports),
              'minimum_required': 3,
              'final_submit_clicked': any(
                  item.get('final_submit_clicked', False) for item in reports
              ),
              'attempts': attempts,
              'reports': reports,
          }
          summary['passed'] = bool(
              len(passed_reports) >= summary['minimum_required']
              and summary['final_submit_clicked'] is False
          )
          open('smartrecruiters-live-smoke.json', 'w').write(
              json.dumps(summary, indent=2, default=str)
          )
          print(json.dumps(summary, indent=2, default=str))
          PY

          python - <<'PY'
          import json
          report = json.load(open('smartrecruiters-live-smoke.json'))
          raise SystemExit(0 if report['passed'] else 1)
          PY
          status=$?
          cat smartrecruiters-live-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert live run never submitted
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('smartrecruiters-live-smoke.json'))
          assert report['final_submit_clicked'] is False
          assert report['passed'] is True
          assert report['passed_form_count'] >= 3
          passed = [item for item in report['reports'] if item.get('passed')]
          assert all(item.get('mode') == 'inspect' for item in passed)
          assert all(item.get('adapter') == 'smartrecruiters' for item in passed)
          assert all(
              (item.get('public_metadata') or {}).get('posting_metadata_certified')
              for item in passed
          )
          assert all(item.get('submit_control_present') for item in passed)
          PY

      - name: Upload live smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartrecruiters-live-smoke-report
          path: |
            backend/smartrecruiters-live-smoke.json
            backend/smartrecruiters-live-attempt-*.json
            backend/smartrecruiters-live-output.txt
            backend/smartrecruiters-live-urls.txt
            backend/smartrecruiters-live-candidates.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when live inspection failed
        if: steps.live_inspection.outputs.exit_code != '0'
        run: exit 1
