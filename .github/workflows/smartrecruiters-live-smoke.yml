name: SmartRecruiters live boundary certification

on:
  pull_request:
    paths:
      - "backend/app/services/ats_*.py"
      - "backend/app/services/smartrecruiters_*.py"
      - "backend/app/services/form_filler*.py"
      - "backend/app/services/upload_handler.py"
      - "backend/scripts/certify_smartrecruiters_live.py"
      - "backend/scripts/classify_smartrecruiters_live_boundary.py"
      - "backend/scripts/select_smartrecruiters_candidates.py"
      - ".github/workflows/smartrecruiters-live-smoke.yml"
  schedule:
    - cron: "7 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-public-boundary-inspection:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./smartrecruiters-live-smoke.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: smartrecruiters-live-smoke-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Select current public SmartRecruiters jobs across tenants
        shell: bash
        run: |
          python scripts/select_smartrecruiters_candidates.py \
            --output smartrecruiters-live-candidates.json \
            --urls-output smartrecruiters-live-urls.txt \
            --limit 30 \
            --per-company 2

      - name: Inspect and classify current live boundaries
        id: live_inspection
        shell: bash
        run: |
          set +e
          : > smartrecruiters-live-output.txt
          rm -f smartrecruiters-live-attempt-*.json \
            smartrecruiters-live-classification-*.json \
            smartrecruiters-live-smoke.json
          index=0
          certified_count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            index=$((index + 1))
            report="smartrecruiters-live-attempt-${index}.json"
            classification="smartrecruiters-live-classification-${index}.json"
            echo "=== Attempt ${index}: ${url} ===" | tee -a smartrecruiters-live-output.txt
            python -u scripts/certify_smartrecruiters_live.py \
              --urls "$url" \
              --report "$report" \
              >> smartrecruiters-live-output.txt 2>&1
            python scripts/classify_smartrecruiters_live_boundary.py \
              --report "$report" \
              --output "$classification" \
              >> smartrecruiters-live-output.txt 2>&1
            classification_status=$?
            if [ "$classification_status" -eq 0 ]; then
              certified_count=$((certified_count + 1))
            fi
            if [ "$certified_count" -ge 3 ]; then
              break
            fi
          done < smartrecruiters-live-urls.txt

          python - <<'PY'
          import glob
          import json

          classifications = [
              json.load(open(path))
              for path in sorted(glob.glob('smartrecruiters-live-classification-*.json'))
          ]
          certified = [item for item in classifications if item.get('passed')]
          summary = {
              'certification': 'smartrecruiters_multi_tenant_live_boundary',
              'attempt_count': len(classifications),
              'certified_boundary_count': len(certified),
              'minimum_required': 3,
              'hosted_form_ready_count': sum(
                  item.get('certified_boundary') == 'hosted_form_ready'
                  for item in certified
              ),
              'pre_form_handoff_count': sum(
                  item.get('certified_boundary') == 'pre_form_anti_bot_handoff'
                  for item in certified
              ),
              'final_submit_clicked': any(
                  item.get('final_submit_clicked', False) for item in classifications
              ),
              'classifications': classifications,
          }
          summary['passed'] = bool(
              len(certified) >= summary['minimum_required']
              and summary['final_submit_clicked'] is False
          )
          open('smartrecruiters-live-smoke.json', 'w').write(
              json.dumps(summary, indent=2, default=str)
          )
          print(json.dumps(summary, indent=2, default=str))
          raise SystemExit(0 if summary['passed'] else 1)
          PY
          status=$?
          cat smartrecruiters-live-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert live boundary and zero submission
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('smartrecruiters-live-smoke.json'))
          assert report['final_submit_clicked'] is False
          assert report['passed'] is True
          assert report['certified_boundary_count'] >= 3
          certified = [item for item in report['classifications'] if item.get('passed')]
          assert all(item.get('official_metadata_verified') for item in certified)
          assert all(item.get('certified_boundary') in {
              'hosted_form_ready', 'pre_form_anti_bot_handoff'
          } for item in certified)
          assert all(item.get('final_submit_clicked') is False for item in certified)
          PY

      - name: Upload live boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartrecruiters-live-boundary-report
          path: |
            backend/smartrecruiters-live-smoke.json
            backend/smartrecruiters-live-attempt-*.json
            backend/smartrecruiters-live-classification-*.json
            backend/smartrecruiters-live-output.txt
            backend/smartrecruiters-live-urls.txt
            backend/smartrecruiters-live-candidates.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when live boundary certification failed
        if: steps.live_inspection.outputs.exit_code != '0'
        run: exit 1
