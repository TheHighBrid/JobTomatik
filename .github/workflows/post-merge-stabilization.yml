name: Post-merge stabilization

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".env.example"
      - ".github/workflows/**"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: post-merge-stabilization-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrated-backend:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./post-merge-test.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: post-merge-ci-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      AUTOPILOT_ENABLED: "false"
      ENABLE_RESUMABLE_HANDOFFS: "false"
      REQUIRE_BROWSER_TESTS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Compile backend
        run: python -m compileall -q app tests

      - name: Run uploaded failure regressions
        shell: bash
        run: |
          set -o pipefail
          pytest -q --tb=short \
            tests/test_operations_policy.py::test_daily_cap_blocks_across_utc_midnight \
            tests/test_operations_policy.py::test_weekly_cap_blocks_across_calendar_week_boundary \
            tests/test_greenhouse_pilot_ingestion.py::test_verified_phase_a_baseline_is_complete_and_fail_safe \
            tests/test_greenhouse_synthetic_certification.py::test_data_compliance_adds_explicit_synthetic_only_consent_policy \
            tests/test_supervised_submission_approval.py::test_direct_greenhouse_live_worker_call_without_approval_is_blocked \
            tests/test_greenhouse_pilot_batch_evaluator.py \
            tests/test_greenhouse_live_workflow_contract.py::test_manifest_batches_keep_safe_exclusions_but_manual_runs_remain_strict \
            tests/test_recovery_incident_drill.py::test_recovery_incident_workflow_contract

      - name: Run integrated backend and browser suite
        shell: bash
        run: |
          set -o pipefail
          pytest -q --tb=short --maxfail=5 -ra | tee integrated-pytest-output.txt

      - name: Upload integrated backend report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: post-merge-integrated-pytest-output
          path: backend/integrated-pytest-output.txt
          if-no-files-found: error
          retention-days: 30

      - name: Verify safety and canonical maturity manifests
        run: |
          python - <<'PY'
          from app.config import get_settings
          from app.services.ats_manifest import ats_certification_manifest
          from app.services.operations_policy import operations_readiness_manifest

          settings = get_settings()
          operations = operations_readiness_manifest()
          ats = ats_certification_manifest()
          adapters = {item["name"]: item for item in ats["adapters"]}

          assert settings.allow_real_application_submit is False
          assert operations["autopilot_enabled"] is False
          assert operations["real_submission_enabled"] is False
          assert operations["invariants"]["autopilot_defaults_off"] is True
          assert operations["invariants"]["user_auto_apply_requires_explicit_opt_in"] is True
          assert {"greenhouse", "lever", "ashby", "smartrecruiters", "workday"} <= set(adapters)
          assert ats["autonomous_adapters"] == []
          assert all(item.get("maturity") != "certified_autonomous" for item in adapters.values())
          assert all(item.get("autonomous_submission_allowed") is False for item in adapters.values())
          assert ats["safety_invariants"]["certification_level_is_descriptive_only"] is True
          print("Integrated safety and canonical adapter maturity verified")
          PY

      - name: Run Alembic migration smoke test
        run: |
          cp alembic.ini alembic-ci.ini
          sed -i 's#sqlalchemy.url = .*#sqlalchemy.url = sqlite:///./migration-smoke.db#' alembic-ci.ini
          alembic -c alembic-ci.ini upgrade head

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deployment-config:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SECRET_KEY: post-merge-compose-secret
      ANTHROPIC_API_KEY: ""
      SENDGRID_API_KEY: ""
      FROM_EMAIL: noreply@example.test
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      AUTOPILOT_ENABLED: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Verify fail-safe Compose defaults
        run: |
          rendered="$(docker compose config)"
          echo "$rendered" | grep -q 'ALLOW_REAL_APPLICATION_SUBMIT: "false"'
          echo "$rendered" | grep -q 'AUTOPILOT_ENABLED: "false"'

  release-gate:
    if: always()
    needs:
      - integrated-backend
      - frontend-build
      - deployment-config
    runs-on: ubuntu-latest
    steps:
      - name: Assert all stabilization jobs passed
        env:
          BACKEND_RESULT: ${{ needs.integrated-backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend-build.result }}
          DEPLOYMENT_RESULT: ${{ needs.deployment-config.result }}
        run: |
          test "$BACKEND_RESULT" = "success"
          test "$FRONTEND_RESULT" = "success"
          test "$DEPLOYMENT_RESULT" = "success"
          echo "Post-merge stabilization gate passed"
