name: Duplicate replay and crash recovery certification

on:
  pull_request:
    paths:
      - "backend/app/models/application.py"
      - "backend/app/models/handoff.py"
      - "backend/app/services/application_state.py"
      - "backend/app/services/handoff_recovery.py"
      - "backend/app/services/handoff_session.py"
      - "backend/app/tasks/applications.py"
      - "backend/tests/test_application_safety.py"
      - "backend/tests/test_handoff_recovery.py"
      - "backend/tests/test_handoff_sessions.py"
      - ".github/workflows/recovery-certification.yml"
  push:
    branches:
      - main
    paths:
      - "backend/app/models/application.py"
      - "backend/app/models/handoff.py"
      - "backend/app/services/application_state.py"
      - "backend/app/services/handoff_recovery.py"
      - "backend/app/services/handoff_session.py"
      - "backend/app/tasks/applications.py"
      - "backend/tests/test_application_safety.py"
      - "backend/tests/test_handoff_recovery.py"
      - "backend/tests/test_handoff_sessions.py"
      - ".github/workflows/recovery-certification.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recovery-drill:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./recovery-certification.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: recovery-certification-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      AUTOPILOT_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Run duplicate replay and crash recovery drill
        id: recovery
        shell: bash
        run: |
          set +e
          pytest -q --tb=short -ra \
            tests/test_application_safety.py::test_explicit_idempotency_key_returns_existing_application \
            tests/test_application_safety.py::test_live_success_without_evidence_becomes_submission_uncertain \
            tests/test_handoff_sessions.py::test_heartbeat_ready_and_resume_state_machine_is_retry_safe \
            tests/test_handoff_recovery.py \
            > recovery-certification.txt 2>&1
          status=$?
          cat recovery-certification.txt
          RECOVERY_EXIT_CODE="$status" python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          from app.config import get_settings

          status = int(os.environ["RECOVERY_EXIT_CODE"])
          settings = get_settings()
          report = {
              "certification": "duplicate_replay_and_crash_recovery",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "passed": status == 0 and settings.allow_real_application_submit is False,
              "real_submission_enabled": bool(settings.allow_real_application_submit),
              "autopilot_enabled": bool(getattr(settings, "autopilot_enabled", False)),
              "gates": {
                  "application_creation_replay_is_idempotent": status == 0,
                  "submit_click_without_evidence_fails_uncertain": status == 0,
                  "handoff_resume_retry_is_idempotent": status == 0,
                  "expired_lease_recovery_rotates_secret": status == 0,
                  "active_lease_cannot_be_displaced": status == 0,
                  "recovery_is_owner_scoped": status == 0,
                  "expired_handoff_fails_closed": status == 0,
                  "real_submission_remained_disabled": settings.allow_real_application_submit is False,
              },
          }
          with open("recovery-certification.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload recovery certification report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: duplicate-replay-crash-recovery-report
          path: |
            backend/recovery-certification.txt
            backend/recovery-certification.json
          if-no-files-found: error
          retention-days: 30

      - name: Fail when recovery certification failed
        if: steps.recovery.outputs.exit_code != '0'
        run: exit 1
