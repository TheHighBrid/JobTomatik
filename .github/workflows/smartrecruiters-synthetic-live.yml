name: SmartRecruiters synthetic live exercise

on:
  pull_request:
    paths:
      - "backend/app/services/ats_*.py"
      - "backend/app/services/smartrecruiters_certification.py"
      - "backend/app/services/form_filler*.py"
      - "backend/app/services/upload_handler.py"
      - "backend/scripts/certify_smartrecruiters_live.py"
      - ".github/workflows/smartrecruiters-synthetic-live.yml"
  schedule:
    - cron: "29 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synthetic-full-form-dry-run:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./smartrecruiters-synthetic-live.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: smartrecruiters-synthetic-live-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      ENABLE_RESUMABLE_HANDOFFS: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Select current certification candidates
        shell: bash
        run: |
          python - <<'PY'
          import httpx

          company = 'smartrecruiters'
          listing = httpx.get(
              f'https://api.smartrecruiters.com/v1/companies/{company}/postings',
              params={'limit': 100, 'offset': 0},
              timeout=25,
              follow_redirects=True,
          )
          listing.raise_for_status()
          jobs = list(listing.json().get('content') or [])
          jobs.sort(key=lambda job: job.get('releasedDate') or '', reverse=True)
          preferred_terms = ('operations', 'consultant', 'support', 'sales', 'data')
          preferred = [
              job for job in jobs
              if any(term in str(job.get('name') or '').lower() for term in preferred_terms)
          ]
          ordered = preferred + [job for job in jobs if job not in preferred]
          urls = []
          for job in ordered:
              identifier = str(job.get('id') or job.get('uuid') or '')
              if not identifier:
                  continue
              details = httpx.get(
                  f'https://api.smartrecruiters.com/v1/companies/{company}/postings/{identifier}',
                  timeout=25,
                  follow_redirects=True,
              )
              if details.status_code != 200:
                  continue
              payload = details.json()
              if payload.get('active') and payload.get('applyUrl'):
                  urls.append(payload['applyUrl'])
              if len(urls) >= 6:
                  break
          if not urls:
              raise SystemExit('No current SmartRecruiters application URLs were returned.')
          open('smartrecruiters-synthetic-candidates.txt', 'w').write('\n'.join(urls))
          print('\n'.join(urls))
          PY

      - name: Exercise a current real form without submission
        id: live_exercise
        shell: bash
        run: |
          set +e
          : > smartrecruiters-synthetic-attempts.txt
          rm -f smartrecruiters-synthetic-live.json
          index=0
          success=1
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            index=$((index + 1))
            report="smartrecruiters-synthetic-attempt-${index}.json"
            echo "=== Attempt ${index}: ${url} ===" | tee -a smartrecruiters-synthetic-attempts.txt
            python -u scripts/certify_smartrecruiters_live.py \
              --urls "$url" \
              --exercise \
              --synthetic-resume-path smartrecruiters-synthetic-resume.pdf \
              --report "$report" \
              >> smartrecruiters-synthetic-attempts.txt 2>&1
            status=$?
            if [ "$status" -eq 0 ]; then
              cp "$report" smartrecruiters-synthetic-live.json
              success=0
              break
            fi
          done < smartrecruiters-synthetic-candidates.txt
          cat smartrecruiters-synthetic-attempts.txt
          echo "exit_code=$success" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert full-form readiness without submission
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('smartrecruiters-synthetic-live.json'))
          assert report['final_submit_clicked'] is False
          assert report['passed'] is True
          exercises = [item for item in report['reports'] if item.get('mode') == 'exercise']
          assert len(exercises) == 1
          exercise = exercises[0]
          assert exercise['adapter'] == 'smartrecruiters'
          assert exercise['certification_outcome'] in {
              'ready_to_submit', 'manual_challenge_handoff'
          }
          assert exercise['fields_filled'] > 0
          assert any(
              item.get('verification') == 'passed'
              for item in exercise.get('upload_evidence') or []
          )
          assert exercise['final_submit_clicked'] is False
          PY

      - name: Upload synthetic live certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartrecruiters-synthetic-live-report
          path: |
            backend/smartrecruiters-synthetic-live.json
            backend/smartrecruiters-synthetic-attempt-*.json
            backend/smartrecruiters-synthetic-attempts.txt
            backend/smartrecruiters-synthetic-candidates.txt
            backend/smartrecruiters-synthetic-resume.pdf
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when the synthetic exercise failed
        if: steps.live_exercise.outputs.exit_code != '0'
        run: exit 1
