name: Workday live boundary certification

on:
  pull_request:
    paths:
      - "backend/app/services/ats_workday.py"
      - "backend/app/services/workday_*.py"
      - "backend/app/services/form_filler*.py"
      - "backend/scripts/certify_workday_live.py"
      - "backend/scripts/select_workday_candidates.py"
      - ".github/workflows/workday-live-smoke.yml"
  schedule:
    - cron: "41 15 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-public-boundary-inspection:
    runs-on: ubuntu-22.04
    timeout-minutes: 75

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./workday-live-smoke.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: workday-live-smoke-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Select current public Workday jobs
        run: |
          python scripts/select_workday_candidates.py \
            --output workday-live-candidates.json \
            --urls-output workday-live-urls.txt \
            --limit 20 \
            --per-tenant 3

      - name: Inspect current CXS metadata and UI boundaries
        id: live_inspection
        shell: bash
        run: |
          set +e
          : > workday-live-output.txt
          rm -f workday-live-attempt-*.json workday-live-smoke.json
          index=0
          success_count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            index=$((index + 1))
            report="workday-live-attempt-${index}.json"
            echo "=== Attempt ${index}: ${url} ===" | tee -a workday-live-output.txt
            python -u scripts/certify_workday_live.py \
              --urls "$url" \
              --report "$report" \
              >> workday-live-output.txt 2>&1
            status=$?
            if [ "$status" -eq 0 ]; then
              success_count=$((success_count + 1))
            fi
            if [ "$success_count" -ge 3 ]; then
              break
            fi
          done < workday-live-urls.txt

          python - <<'PY'
          import glob
          import json

          attempts = []
          reports = []
          for path in sorted(glob.glob('workday-live-attempt-*.json')):
              payload = json.load(open(path))
              attempts.append({
                  'path': path,
                  'passed': bool(payload.get('passed')),
                  'final_submit_clicked': bool(payload.get('final_submit_clicked')),
              })
              reports.extend(payload.get('reports') or [])
          passed = [item for item in reports if item.get('mode') == 'inspect' and item.get('passed')]
          summary = {
              'certification': 'workday_current_live_boundary',
              'attempt_count': len(attempts),
              'passed_boundary_count': len(passed),
              'minimum_required': 3,
              'final_submit_clicked': any(
                  item.get('final_submit_clicked', False) for item in reports
              ),
              'attempts': attempts,
              'reports': reports,
          }
          summary['passed'] = bool(
              len(passed) >= summary['minimum_required']
              and summary['final_submit_clicked'] is False
          )
          open('workday-live-smoke.json', 'w').write(
              json.dumps(summary, indent=2, default=str)
          )
          print(json.dumps(summary, indent=2, default=str))
          raise SystemExit(0 if summary['passed'] else 1)
          PY
          status=$?
          cat workday-live-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert live boundary and zero submission
        if: always()
        run: |
          python - <<'PY'
          import json
          report = json.load(open('workday-live-smoke.json'))
          assert report['final_submit_clicked'] is False
          assert report['passed'] is True
          assert report['passed_boundary_count'] >= 3
          passed = [
              item for item in report['reports']
              if item.get('mode') == 'inspect' and item.get('passed')
          ]
          assert all(item.get('adapter') == 'workday' for item in passed)
          assert all(
              (item.get('public_metadata') or {}).get('public_metadata_certified')
              for item in passed
          )
          assert all(
              item.get('rendered_application_surface') or item.get('manual_boundary')
              for item in passed
          )
          PY

      - name: Upload Workday live boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workday-live-boundary-report
          path: |
            backend/workday-live-smoke.json
            backend/workday-live-attempt-*.json
            backend/workday-live-output.txt
            backend/workday-live-urls.txt
            backend/workday-live-candidates.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when live boundary certification failed
        if: steps.live_inspection.outputs.exit_code != '0'
        run: exit 1
