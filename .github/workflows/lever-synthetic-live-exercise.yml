name: Lever synthetic live exercise

on:
  pull_request:
    paths:
      - "backend/app/services/ats_*.py"
      - "backend/app/services/form_filler*.py"
      - "backend/app/services/upload_handler.py"
      - "backend/app/services/lever_certification.py"
      - "backend/scripts/certify_lever_live.py"
      - ".github/workflows/lever-synthetic-live-exercise.yml"
  schedule:
    - cron: "41 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synthetic-full-form-dry-run:
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./lever-synthetic-live.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: lever-synthetic-live-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Select a current certification-compatible Lever job
        shell: bash
        run: |
          python - <<'PY'
          import httpx

          response = httpx.get(
              'https://api.lever.co/v0/postings/pointclickcare',
              params={'mode': 'json', 'limit': 12},
              timeout=25,
              follow_redirects=True,
          )
          response.raise_for_status()
          jobs = response.json()
          preferred = [
              job for job in jobs
              if job.get('applyUrl')
              and 'talent community' not in str(job.get('text') or '').lower()
          ]
          if not preferred:
              raise SystemExit('No current PointClickCare Lever job was available.')
          selected = preferred[0]
          open('lever-synthetic-url.txt', 'w').write(selected['applyUrl'])
          print(selected.get('text'))
          print(selected['applyUrl'])
          PY

      - name: Exercise the real form with a synthetic candidate
        id: live_exercise
        shell: bash
        run: |
          set +e
          python -u scripts/certify_lever_live.py \
            --urls "$(cat lever-synthetic-url.txt)" \
            --exercise \
            --synthetic-resume-path lever-synthetic-resume.pdf \
            --report lever-synthetic-live.json \
            > lever-synthetic-output.txt 2>&1
          status=$?
          cat lever-synthetic-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert full-form readiness without submission
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('lever-synthetic-live.json'))
          assert report['final_submit_clicked'] is False
          assert report['passed'] is True
          inspections = [item for item in report['reports'] if item.get('mode') == 'inspect']
          exercises = [item for item in report['reports'] if item.get('mode') == 'exercise']
          assert len(inspections) == 1
          assert len(exercises) == 1
          assert inspections[0]['adapter'] == 'lever'
          assert exercises[0]['adapter'] == 'lever'
          assert exercises[0]['certification_outcome'] in {
              'ready_to_submit', 'manual_challenge_handoff'
          }
          assert exercises[0]['final_submit_clicked'] is False
          assert exercises[0]['fields_filled'] > 0
          assert any(
              item.get('verification') == 'passed'
              for item in exercises[0].get('upload_evidence') or []
          )
          PY

      - name: Upload synthetic live certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lever-synthetic-live-report
          path: |
            backend/lever-synthetic-live.json
            backend/lever-synthetic-output.txt
            backend/lever-synthetic-url.txt
            backend/lever-synthetic-resume.pdf
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when the synthetic exercise failed
        if: steps.live_exercise.outputs.exit_code != '0'
        run: exit 1
