name: Greenhouse Phase B intake and dossier certification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/app/api/supervised_pilot_roster.py"
      - "backend/app/schemas/supervised_pilot_dossier.py"
      - "backend/app/schemas/supervised_pilot_roster.py"
      - "backend/app/services/supervised_pilot_dossier.py"
      - "backend/app/services/supervised_pilot_intake.py"
      - "backend/tests/test_supervised_pilot_dossier.py"
      - "backend/tests/test_supervised_pilot_intake.py"
      - "frontend/src/components/SupervisedPilotDossierPanel.jsx"
      - "frontend/src/components/SupervisedPilotRoster.jsx"
      - "docs/operations/greenhouse-phase-b-dossier.md"
      - "docs/operations/greenhouse-phase-b-intake.md"
      - ".github/workflows/greenhouse-phase-b-dossier.yml"
  push:
    branches:
      - main
    paths:
      - "backend/app/api/supervised_pilot_roster.py"
      - "backend/app/schemas/supervised_pilot_dossier.py"
      - "backend/app/schemas/supervised_pilot_roster.py"
      - "backend/app/services/supervised_pilot_dossier.py"
      - "backend/app/services/supervised_pilot_intake.py"
      - "backend/tests/test_supervised_pilot_dossier.py"
      - "backend/tests/test_supervised_pilot_intake.py"
      - "frontend/src/components/SupervisedPilotDossierPanel.jsx"
      - "frontend/src/components/SupervisedPilotRoster.jsx"
      - "docs/operations/greenhouse-phase-b-dossier.md"
      - "docs/operations/greenhouse-phase-b-intake.md"
      - ".github/workflows/greenhouse-phase-b-dossier.yml"

permissions:
  contents: read

jobs:
  phase-b-review-preparation:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:///./phase-b-dossier-ci.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: phase-b-dossier-ci-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      GREENHOUSE_SUPERVISED_PILOT_ENABLED: "false"
      AUTOPILOT_ENABLED: "false"
      ENABLE_RESUMABLE_HANDOFFS: "false"
      GREENHOUSE_PILOT_BASELINE_PATH: evidence/greenhouse-phase-a-baseline.csv
      GREENHOUSE_PILOT_LEDGER_PATH: evidence-ci/greenhouse-pilot-ledger.jsonl
      GREENHOUSE_PILOT_READINESS_JSON_PATH: evidence-ci/greenhouse-pilot-readiness.json
      GREENHOUSE_PILOT_READINESS_MARKDOWN_PATH: evidence-ci/greenhouse-pilot-readiness.md
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Compile Phase B preparation modules
        working-directory: backend
        run: |
          python -m py_compile \
            app/services/supervised_pilot_dossier.py \
            app/services/supervised_pilot_intake.py \
            app/schemas/supervised_pilot_dossier.py \
            app/schemas/supervised_pilot_roster.py \
            app/api/supervised_pilot_roster.py

      - name: Run Phase B preparation regression suite
        working-directory: backend
        run: |
          pytest -q --tb=short -ra \
            tests/test_supervised_pilot_dossier.py \
            tests/test_supervised_pilot_intake.py \
            --junitxml=phase-b-preparation-pytest.xml

      - name: Upload Phase B regression report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: greenhouse-phase-b-preparation-pytest
          path: backend/phase-b-preparation-pytest.xml
          if-no-files-found: error
          retention-days: 30

      - name: Assert fail-safe Phase B preparation boundary
        working-directory: backend
        run: |
          python - <<'PY'
          from app.config import get_settings
          from app.services.supervised_pilot_dossier import MANDATORY_STOP_REASONS
          from app.services.supervised_pilot_intake import INTAKE_SOURCE, SELECTION_POLICY

          settings = get_settings()
          assert settings.allow_real_application_submit is False
          assert settings.greenhouse_supervised_pilot_enabled is False
          assert INTAKE_SOURCE == "manual_greenhouse_phase_b"
          assert SELECTION_POLICY == "user_selected_exact_application"
          assert "captcha_detected" in MANDATORY_STOP_REASONS
          assert "identity_verification_required" in MANDATORY_STOP_REASONS
          print("Phase B intake and dossier remain preparation-only and fail closed")
          PY

      - name: Assert preparation UI has no approval or submit action
        run: |
          ! grep -E "queueSupervisedSubmission|createSupervisedSubmissionApproval|submitApplication" frontend/src/components/SupervisedPilotDossierPanel.jsx
          ! grep -E "queueSupervisedSubmission|createSupervisedSubmissionApproval|submitApplication" frontend/src/components/SupervisedPilotRoster.jsx
          grep -q "Download JSON" frontend/src/components/SupervisedPilotDossierPanel.jsx
          grep -q "Add to preparation roster" frontend/src/components/SupervisedPilotRoster.jsx

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Phase B preparation interface
        working-directory: frontend
        run: npm run build
