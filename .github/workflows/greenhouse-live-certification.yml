name: Supervised live Greenhouse certification

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Public Greenhouse job URLs, separated by commas or new lines"
        required: true
        type: string
      exercise:
        description: "Traverse and fill every step with a generated synthetic profile in dry-run mode"
        required: true
        default: false
        type: boolean
  push:
    branches:
      - "agent/greenhouse-pilot-*"
    paths:
      - "backend/greenhouse-pilot-urls.txt"
      - ".github/workflows/greenhouse-live-certification.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/greenhouse-pilot-urls.txt"

permissions:
  contents: read

jobs:
  supervised-live-dry-run:
    if: ${{ github.event_name != 'pull_request' || startsWith(github.head_ref, 'agent/greenhouse-pilot-') }}
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./greenhouse-live-certification.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: greenhouse-live-certification-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"
      GREENHOUSE_CERT_RESUME_PATH: ./greenhouse-synthetic-resume.pdf
      GREENHOUSE_PILOT_URL_MANIFEST: ./greenhouse-pilot-urls.txt

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run supervised live dry-run
        id: live_certification
        shell: bash
        env:
          GREENHOUSE_CERT_URLS: ${{ inputs.urls }}
        run: |
          set +e
          exercise_mode="${{ inputs.exercise }}"

          if [[ "$GITHUB_EVENT_NAME" == "push" || "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            if [[ ! -s "$GREENHOUSE_PILOT_URL_MANIFEST" ]]; then
              echo "Pilot URL manifest is missing or empty: $GREENHOUSE_PILOT_URL_MANIFEST"
              echo "exit_code=1" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            export GREENHOUSE_CERT_URLS="$(cat "$GREENHOUSE_PILOT_URL_MANIFEST")"
            exercise_mode="true"
            echo "Running synthetic pilot certification from $GREENHOUSE_PILOT_URL_MANIFEST"
          fi

          if [[ -z "${GREENHOUSE_CERT_URLS//[[:space:],]/}" ]]; then
            echo "No public Greenhouse URLs were provided."
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          args=(--report greenhouse-live-certification.json)
          if [[ "$exercise_mode" == "true" ]]; then
            args+=(
              --exercise
              --synthetic-profile
              --synthetic-resume-path "$GREENHOUSE_CERT_RESUME_PATH"
            )
          fi
          python -u scripts/certify_greenhouse_live.py "${args[@]}" \
            > greenhouse-live-certification-output.txt 2>&1
          status=$?
          cat greenhouse-live-certification-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert certification report exists
        if: always()
        shell: bash
        run: |
          test -s greenhouse-live-certification.json || {
            echo "greenhouse-live-certification.json was not created."
            exit 1
          }

      - name: Assert no final submit action occurred
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("greenhouse-live-certification.json")
          if not path.exists():
              raise SystemExit("greenhouse-live-certification.json was not created")

          report = json.loads(path.read_text(encoding="utf-8"))
          assert report.get("final_submit_clicked") is False
          for index, item in enumerate(report.get("reports", [])):
              assert item.get("final_submit_clicked", False) is False, index
          print("Safety assertion passed: no final submit action occurred.")
          PY

      - name: Build pilot evidence ledger and readiness report
        if: ${{ always() && (inputs.exercise || github.event_name == 'push' || github.event_name == 'pull_request') }}
        shell: bash
        run: |
          if [[ ! -s greenhouse-live-certification.json ]]; then
            echo "Skipping ledger generation because the source report is missing."
            exit 0
          fi
          python scripts/update_greenhouse_pilot_ledger.py \
            --input greenhouse-live-certification.json \
            --operator "github-actions:${{ github.actor }}" \
            --source-reference "github:${{ github.run_id }}:${{ github.run_attempt }}" \
            --ledger greenhouse-pilot-ledger.jsonl \
            --summary-json greenhouse-pilot-readiness.json \
            --summary-markdown greenhouse-pilot-readiness.md

      - name: Upload live certification report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: greenhouse-supervised-live-certification-report
          path: |
            backend/greenhouse-live-certification.json
            backend/greenhouse-live-certification-output.txt
            backend/greenhouse-pilot-ledger.jsonl
            backend/greenhouse-pilot-readiness.json
            backend/greenhouse-pilot-readiness.md
            backend/greenhouse-synthetic-resume.pdf
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when live certification failed
        if: steps.live_certification.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "Greenhouse certification did not pass."
          echo "Download the workflow artifact and inspect the JSON and output log."
          exit 1
