name: Lever live smoke certification

on:
  pull_request:
    paths:
      - "backend/app/services/ats_*.py"
      - "backend/app/services/form_filler*.py"
      - "backend/app/services/upload_handler.py"
      - "backend/app/services/lever_certification.py"
      - "backend/scripts/certify_lever_live.py"
      - ".github/workflows/lever-live-smoke.yml"
  schedule:
    - cron: "29 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-public-form-inspection:
    runs-on: ubuntu-22.04
    timeout-minutes: 35

    defaults:
      run:
        working-directory: backend

    env:
      PYTHONPATH: .
      DATABASE_URL: sqlite:///./lever-live-smoke.db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: lever-live-smoke-secret
      AI_PROVIDER: template
      DEV_MOCK_JOBS: "false"
      ALLOW_REAL_APPLICATION_SUBMIT: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -q --disable-pip-version-check -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Select current public Lever jobs
        shell: bash
        run: |
          python - <<'PY'
          import httpx

          response = httpx.get(
              'https://api.lever.co/v0/postings/pointclickcare',
              params={'mode': 'json', 'limit': 6},
              timeout=25,
              follow_redirects=True,
          )
          response.raise_for_status()
          jobs = response.json()
          urls = [job.get('applyUrl') for job in jobs if job.get('applyUrl')][:3]
          if not urls:
              raise SystemExit('No current PointClickCare Lever jobs were returned.')
          open('lever-live-urls.txt', 'w').write('\n'.join(urls))
          print('\n'.join(urls))
          PY

      - name: Inspect current live forms and official metadata
        id: live_inspection
        shell: bash
        run: |
          set +e
          python -u scripts/certify_lever_live.py \
            --urls "$(cat lever-live-urls.txt)" \
            --report lever-live-smoke.json \
            > lever-live-output.txt 2>&1
          status=$?
          cat lever-live-output.txt
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Assert live run never submitted
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          report = json.load(open('lever-live-smoke.json'))
          assert report['final_submit_clicked'] is False
          assert report['url_count'] >= 1
          assert all(item.get('mode') == 'inspect' for item in report['reports'])
          assert all(item.get('adapter') == 'lever' for item in report['reports'])
          assert all(
              (item.get('posting_metadata') or {}).get('custom_questions_exposed_by_official_api') is False
              for item in report['reports']
          )
          assert report['passed'] is True
          PY

      - name: Upload live smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lever-live-smoke-report
          path: |
            backend/lever-live-smoke.json
            backend/lever-live-output.txt
            backend/lever-live-urls.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when live inspection failed
        if: steps.live_inspection.outputs.exit_code != '0'
        run: exit 1
